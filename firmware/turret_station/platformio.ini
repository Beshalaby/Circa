; Circa Turret Station — PlatformIO project
; Board: ESP32 Dev Module
; Flash with: pio run --target upload

[env:esp32dev]
platform           = espressif32
board              = esp32dev
framework          = arduino
monitor_speed      = 115200
upload_speed       = 921600

lib_deps =
    madhephaestus/ESP32Servo @ ^3.0.6
